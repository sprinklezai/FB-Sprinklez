  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}\n  @keyframes toastIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex;min-height:100vh\">\n  <!-- sidebar -->\n  \n\n  <!-- main -->\n  <aside style=\"width:224px;flex:none;background:#124a3a;color:#d3e7de;padding:22px 16px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh\">\n    <div style=\"padding:6px 8px 20px;display:flex;justify-content:flex-start\">\n      <img src=\"b1358a9d-24fa-47cf-872d-bb4d87f14c1c\" alt=\"Sushi Library\" style=\"height:64px;width:auto;display:block;filter:drop-shadow(0 1px 2px rgba(0,0,0,.35))\">\n    <\u002Fdiv>\n    <div style=\"font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.14em;color:#8fc7b6;padding:6px 10px 4px\">ANALYZE<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;background:#0c3729;color:#fff;font:600 13.5px 'IBM Plex Sans'\">◆ Sales Dashboard<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;font:500 13.5px 'IBM Plex Sans';color:#bfe0d5\">▤ P&amp;L Dashboard<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;font:500 13.5px 'IBM Plex Sans';color:#bfe0d5\">▦ Delivery Business<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;font:500 13.5px 'IBM Plex Sans';color:#bfe0d5\">◧ Customer Reviews<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;font:500 13.5px 'IBM Plex Sans';color:#bfe0d5\">⬡ Project Pipeline<\u002Fdiv>\n    \n    <div style=\"font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.14em;color:#8fc7b6;padding:18px 10px 4px\">ACCOUNT<\u002Fdiv><div style=\"display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;font:500 13.5px 'IBM Plex Sans';color:#bfe0d5\">◔ Reports<\u002Fdiv>\n    \n    <div style=\"display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;font:500 13.5px 'IBM Plex Sans';color:#bfe0d5\">⚙ Settings<\u002Fdiv><div style=\"margin-top:auto;display:flex;align-items:center;gap:10px;padding:10px 8px;border-top:1px solid #2e8871\">\n      <div style=\"width:32px;height:32px;border-radius:50%;background:#c69a63;color:#2a1d0c;font:600 12px 'IBM Plex Sans';display:flex;align-items:center;justify-content:center\">AK<\u002Fdiv>\n      <div style=\"line-height:1.25\"><div style=\"font:600 12.5px 'IBM Plex Sans';color:#fff\">Ankit Saraf<\u002Fdiv><div style=\"font:400 11px 'IBM Plex Mono';color:#93c4b6\">Head of Finance<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside><div style=\"flex:1;display:flex;flex-direction:column;min-width:0\">\n    <!-- topbar -->\n    <div style=\"display:flex;align-items:center;gap:10px;padding:18px 26px;background:#fff;border-bottom:1px solid #e6e3dc;position:sticky;top:0;z-index:20;flex-wrap:wrap\">\n      <div style=\"flex:1;min-width:220px\"><div style=\"font:600 19px 'IBM Plex Sans';color:#16181a\">Business Overview<\u002Fdiv><div style=\"font:400 12.5px 'IBM Plex Mono';color:#8a8f92\">{{ scopeLabel }}<\u002Fdiv><\u002Fdiv>\n\n      <!-- location dropdown -->\n      <div style=\"position:relative\">\n        <div onclick=\"{{ toggleLocationMenu }}\" style=\"display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid #dcd9d1;border-radius:8px;background:#faf9f6;font:500 12.5px 'IBM Plex Sans';color:#4a4f52;cursor:pointer;user-select:none\" style-hover=\"border-color:#1c5c46\">⬢ {{ locationLabel }} <span style=\"color:#b5b9bb\">▾<\u002Fspan><\u002Fdiv>\n        <sc-if value=\"{{ locationMenuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;top:44px;right:0;background:#fff;border:1px solid #e2ded4;border-radius:10px;box-shadow:0 12px 34px -10px rgba(0,0,0,.28);padding:6px;min-width:230px;max-height:340px;overflow-y:auto;z-index:40\">\n            <sc-for list=\"{{ locationOpts }}\" as=\"b\" hint-placeholder-count=\"6\">\n              <div onclick=\"{{ b.onClick }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 11px;border-radius:7px;font:500 12.5px 'IBM Plex Sans';color:{{ b.fg }};background:{{ b.bg }};cursor:pointer\" style-hover=\"background:#f2f0ea\">{{ b.label }}<span style=\"font-family:'IBM Plex Mono';font-size:11px;color:#a3a6a8\">{{ b.hint }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- region dropdown -->\n      <div style=\"position:relative\">\n        <div onclick=\"{{ toggleRegionMenu }}\" style=\"display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid #dcd9d1;border-radius:8px;background:#faf9f6;font:500 12.5px 'IBM Plex Sans';color:#4a4f52;cursor:pointer;user-select:none\" style-hover=\"border-color:#1c5c46\">⬡ {{ regionLabel }} <span style=\"color:#b5b9bb\">▾<\u002Fspan><\u002Fdiv>\n        <sc-if value=\"{{ regionMenuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;top:44px;right:0;background:#fff;border:1px solid #e2ded4;border-radius:10px;box-shadow:0 12px 34px -10px rgba(0,0,0,.28);padding:6px;min-width:184px;z-index:40\">\n            <sc-for list=\"{{ regionOpts }}\" as=\"o\" hint-placeholder-count=\"6\">\n              <div onclick=\"{{ o.onClick }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 11px;border-radius:7px;font:500 12.5px 'IBM Plex Sans';color:{{ o.fg }};background:{{ o.bg }};cursor:pointer\" style-hover=\"background:#f2f0ea\">{{ o.label }}<span style=\"font-family:'IBM Plex Mono';font-size:11px;color:#a3a6a8\">{{ o.hint }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- range segmented -
